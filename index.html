<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>royal.j.braganza • Instagram</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="scripts.js" defer></script>
  </head>
  <body>
    <div class="workspace">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span>Instagram</span>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active">Home</button>
          <button class="nav-item">Search</button>
          <button class="nav-item">Explore</button>
          <button class="nav-item">Reels</button>
          <button class="nav-item">Messages</button>
          <button class="nav-item">Notifications</button>
          <button class="nav-item">Create</button>
          <button class="nav-item">Profile</button>
          <button class="nav-item">More</button>
        </nav>
      </aside>

      <main class="profile-view">
        <section class="profile-top">
          <div class="profile-avatar">
            <div class="profile-ring">
              <div class="inner-circle">
                <img src="image.png" alt="Johnathan Mercurial Braganza" />
              </div>
            </div>
          </div>

          <div class="profile-summary">
            <div class="profile-heading">
              <h1>royal.j.braganza</h1>
              <div class="actions-row">
                <button id="followBtn" class="action-btn follow-btn">Follow</button>
                <button id="friendBtn" class="action-btn secondary-btn">Add Friend</button>
                <button id="messageBtn" class="action-btn tertiary-btn">Message</button>
              </div>
            </div>

            <div class="stats-row">
              <div class="stat-item">
                <strong>20</strong>
                <span>posts</span>
              </div>
              <div class="stat-item">
                <strong id="followersCount">1B</strong>
                <span>followers</span>
              </div>
              <div class="stat-item">
                <strong>0</strong>
                <span>following</span>
              </div>
            </div>

            <div class="profile-bio">
              <p class="real-name">Johnathan Mercurial Braganza</p>
              <p>Volatile, unpredictable and ready to change the world. <strong>@rockers</strong> + <strong>@moodybands</strong>
                <br />My favs | <strong>@dirksavage</strong> my alter ego</p>
            </div>
          </div>
        </section>

        <section class="posts-section">
          <div class="posts-header">
            <div>
              <button class="tab active">POSTS</button>
              <button class="tab">SAVED</button>
              <button class="tab">TAGGED</button>
            </div>
          </div>

          <div id="postGrid" class="post-grid"></div>
        </section>
      </main>
    </div>
  </body>
</html>
